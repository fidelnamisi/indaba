<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Indaba</title>
  <link rel="stylesheet" href="/static/style.css"/>
</head>
<body>

<!-- ── TOP BAR ─────────────────────────────────────────────────── -->
<header id="topbar">
  <div class="topbar-left">
    <div class="logo">Indaba</div>
    <nav class="topbar-nav" id="top-nav">
      <button class="mode-btn active" data-mode="pipeline" onclick="switchMode('pipeline')">PIPELINE</button>
      <button class="mode-btn" data-mode="works" onclick="switchMode('works')">WORKS</button>
      <button class="mode-btn" data-mode="promote" onclick="switchMode('promote')">PROMOTE</button>
    </nav>
    <div id="topbar-date" class="topbar-date"></div>
  </div>
  <div class="topbar-right">
    <div id="window-pill" class="window-pill"></div>
    <div id="clock" class="clock"></div>
    <button class="icon-btn" id="btn-theme"    title="Toggle light/dark mode">Light</button>
    <button class="icon-btn" id="btn-notes"    title="Concept Notes">Notes</button>
    <button class="icon-btn" id="btn-log"      title="Event Log">Log</button>
    <button class="icon-btn" id="btn-help"     title="Help / Reference">?</button>
    <button class="icon-btn" id="btn-settings" title="Settings">⚙</button>
  </div>
</header>

<!-- ── MAIN ────────────────────────────────────────────────────── -->
<div id="main-content">

  <!-- MODE: PIPELINE (Content Workflow Overview) -->
  <div id="view-pipeline" class="mode-view">
    <div id="pipeline-container" class="view-container">
      <!-- Phase 3: Pipeline Overview — metric cards + drill-down list -->
    </div>
  </div>

  <!-- MODE: WORKS (Browse & manage all Works and Modules) -->
  <div id="view-works" class="mode-view" style="display:none;">
    <div id="works-container" class="view-container">
      <!-- Phase 3/4: Works screen — Content Schema + Workflow status per Module -->
    </div>
  </div>

  <!-- MODE: PROMOTE (Broadcast layer + CRM layer) -->
  <div id="view-promote" class="mode-view" style="display:none;">
    <div class="manage-layout">
      <div class="manage-sidebar">
        <div class="promo-tab-bar">
          <div class="promo-tab-group-label">BROADCAST</div>
          <button class="promo-tab-btn active" data-promo-tab="broadcast-posts" onclick="switchPromoTab('broadcast-posts')">Broadcast Posts</button>
          <button class="promo-tab-btn" data-promo-tab="message-maker" onclick="switchPromoTab('message-maker')">Messages</button>
          <button class="promo-tab-btn" data-promo-tab="sender" onclick="switchPromoTab('sender')">Outbox</button>
          <button class="promo-tab-btn" data-promo-tab="book-serializer" onclick="switchPromoTab('book-serializer')">Serializer</button>
          <div class="promo-tab-divider"></div>
          <div class="promo-tab-group-label">CRM</div>
          <button class="promo-tab-btn" data-promo-tab="contacts" onclick="switchPromoTab('contacts')">Contacts</button>
          <button class="promo-tab-btn" data-promo-tab="leads" onclick="switchPromoTab('leads')">Leads</button>
        </div>
      </div>
      <div class="manage-body">
        <div id="promo-view-broadcast-posts" class="promo-view-container"></div>
        <div id="promo-view-message-maker" class="promo-view-container" style="display:none"></div>
        <div id="promo-view-sender" class="promo-view-container" style="display:none"></div>
        <div id="promo-view-book-serializer" class="promo-view-container" style="display:none"></div>
        <div id="promo-view-contacts" class="promo-view-container" style="display:none"></div>
        <div id="promo-view-leads" class="promo-view-container" style="display:none"></div>
        <!-- Kept for compatibility; not in sidebar -->
        <div id="promo-view-command-center" class="promo-view-container" style="display:none"></div>
        <div id="promo-view-promo-settings" class="promo-view-container" style="display:none"></div>
      </div>
    </div>
  </div>

</div>

<!-- ── MODAL OVERLAY ───────────────────────────────────────────── -->
<div id="modal-overlay" class="hidden">
  <div id="modal-box">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div id="modal-content"></div>
  </div>
</div>

<script src="/static/app.js"></script>
</body>
</html>
