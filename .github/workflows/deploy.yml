name: Deploy to EC2
on:
  push:
    branches: [main]
permissions:
  contents: read
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 13.218.60.13
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          command_timeout: 10m
          # The token is substituted into the script string by GitHub
          # Actions before the script is sent over SSH. Direct substitution
          # is more reliable than `envs:` which has not been passing the
          # env var through reliably in practice.
          script: |
            # Capture the entire deploy script's stdout+stderr to a log file
            # on EC2 so the smoke-proverb workflow can read it even when the
            # deploy fails. Without this, failures inside appleboy/ssh-action
            # are invisible to anyone without GitHub Actions log access.
            exec > >(tee /tmp/last-deploy.log) 2>&1
            echo "===== DEPLOY START $(date -u +%Y-%m-%dT%H:%M:%SZ) ====="
            set -eu

            WORK=/opt/indaba-app
            STAGE=/opt/indaba-app.stage
            BACKUP=/opt/indaba-app.previous
            TMPCLONE=/tmp/indaba-stage

            # Set the token in an isolated subshell with no trace, so it
            # never leaks into /tmp/last-deploy.log (which is posted to a
            # public-style GitHub issue comment).
            { TOKEN='${{ secrets.GITHUB_TOKEN }}'; } 2>/dev/null
            echo "[diag] token present: $([ -n "$TOKEN" ] && echo yes || echo no), length: ${#TOKEN}"

            set -x

            # Clone as the ubuntu user (no sudo) into /tmp. The repo is
            # private so the request carries the workflow's GITHUB_TOKEN
            # as a bearer header.
            rm -rf "$TMPCLONE"
            { set +x; } 2>/dev/null
            git -c http.extraHeader="Authorization: bearer $TOKEN" \
              clone --depth=1 --branch main \
              https://github.com/fidelnamisi/indaba.git "$TMPCLONE"
            unset TOKEN
            set -x

            # Move the fresh clone into /opt and reset the remote URL so
            # the token doesn't persist in .git/config.
            sudo rm -rf "$STAGE"
            sudo mv "$TMPCLONE" "$STAGE"
            sudo chown -R ubuntu:ubuntu "$STAGE"
            git -C "$STAGE" remote set-url origin https://github.com/fidelnamisi/indaba.git

            # Preserve runtime state from current deploy:
            # - data/ holds bot-written proverbs, pcloud_token.json, etc.
            # - venv/ avoids re-running pip install on every deploy.
            if [ -d "$WORK/data" ]; then
              cp -a "$WORK/data" "$STAGE/data"
            fi
            if [ -d "$WORK/venv" ]; then
              mv "$WORK/venv" "$STAGE/venv"
            else
              python3 -m venv "$STAGE/venv"
            fi

            # Sync python deps inside the staged venv before swapping.
            "$STAGE/venv/bin/python" -m pip install --upgrade pip
            "$STAGE/venv/bin/pip" install -r "$STAGE/requirements.txt"

            # Stop the running service before swapping directories.
            sudo systemctl stop indaba-app || true
            sudo pkill -9 -f "python.*app.py" || true
            sudo lsof -ti :5050 | xargs -r sudo kill -9 || true
            sudo lsof -ti :5051 | xargs -r sudo kill -9 || true
            sleep 2

            # Atomic-ish swap: keep the previous release as a rollback point.
            sudo rm -rf "$BACKUP"
            if [ -d "$WORK" ]; then
              sudo mv "$WORK" "$BACKUP"
            fi
            sudo mv "$STAGE" "$WORK"
            sudo chown -R ubuntu:ubuntu "$WORK"

            sudo systemctl restart indaba-app
            sleep 6

            # Loud diagnostics if the service didn't come up.
            if ! sudo systemctl is-active --quiet indaba-app; then
              echo "::error::indaba-app service did not become active"
              echo "--- systemctl status ---"
              sudo systemctl status indaba-app --no-pager || true
              echo "--- last 80 journal lines ---"
              sudo journalctl -u indaba-app -n 80 --no-pager || true
              exit 1
            fi

            if ! curl -sf --max-time 15 http://localhost:5050/api/content-pipeline > /dev/null; then
              echo "::error::Health check FAILED — app not responding on :5050"
              echo "--- listening ports ---"
              sudo lsof -i :5050 || true
              echo "--- last 80 journal lines ---"
              sudo journalctl -u indaba-app -n 80 --no-pager || true
              exit 1
            fi
            echo "Health check passed — app is serving"
            echo "===== DEPLOY OK $(date -u +%Y-%m-%dT%H:%M:%SZ) ====="
