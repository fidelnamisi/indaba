name: Deploy to EC2
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 13.218.60.13
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          command_timeout: 10m
          script: |
            set -eux
            cd /opt/indaba-app

            # Ensure the working tree is owned by ubuntu so git can always
            # rewrite files. Past root-owned files (e.g. from initial scp
            # bootstrap) are the most likely cause of `git checkout`
            # failing silently and aborting the deploy.
            sudo chown -R ubuntu:ubuntu /opt/indaba-app

            # Bulletproof git sync — end with HEAD on `main` pointing at
            # origin/main, regardless of any prior state (unborn branch,
            # detached HEAD, missing/corrupt .git, drifted working tree).
            # Uses plumbing commands (update-ref / symbolic-ref) instead of
            # porcelain `git checkout`, which fails on unborn branches.
            if [ ! -d ".git" ] || ! git rev-parse --git-dir >/dev/null 2>&1; then
              echo "[deploy] Rebuilding .git from scratch..."
              rm -rf .git
              git init -q
              git remote add origin https://github.com/fidelnamisi/indaba.git
            else
              git remote set-url origin https://github.com/fidelnamisi/indaba.git
            fi
            git fetch --depth=1 origin main
            git update-ref refs/heads/main FETCH_HEAD
            git symbolic-ref HEAD refs/heads/main
            git reset --hard refs/heads/main
            # Purge untracked drift; venv/ and data/ are gitignored so survive.
            git clean -fd

            # Create venv if missing so pip install doesn't silently go global.
            if [ ! -d "venv" ]; then
              echo "[deploy] Creating venv..."
              python3 -m venv venv
            fi
            source venv/bin/activate
            python -m pip install --upgrade pip
            pip install -r requirements.txt

            # Stop any stale processes / port holders before systemd restart.
            sudo pkill -9 -f "python.*app.py" || true
            sudo lsof -ti :5050 | xargs -r sudo kill -9 || true
            sudo lsof -ti :5051 | xargs -r sudo kill -9 || true
            sleep 2

            sudo systemctl restart indaba-app
            sleep 6

            # Loud diagnostics if the service didn't come up.
            if ! sudo systemctl is-active --quiet indaba-app; then
              echo "::error::indaba-app service did not become active"
              echo "--- systemctl status ---"
              sudo systemctl status indaba-app --no-pager || true
              echo "--- last 80 journal lines ---"
              sudo journalctl -u indaba-app -n 80 --no-pager || true
              exit 1
            fi

            if ! curl -sf --max-time 15 http://localhost:5050/api/content-pipeline > /dev/null; then
              echo "::error::Health check FAILED — app not responding on :5050"
              echo "--- listening ports ---"
              sudo lsof -i :5050 || true
              echo "--- last 80 journal lines ---"
              sudo journalctl -u indaba-app -n 80 --no-pager || true
              exit 1
            fi
            echo "Health check passed — app is serving"
