name: Deploy to EC2
on:
  push:
    branches: [main]
permissions:
  contents: read
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 13.218.60.13
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          command_timeout: 10m
          # GITHUB_TOKEN is substituted into the script string by GitHub
          # Actions before the script is sent over SSH (more reliable
          # than `envs:` which has not been passing through in practice).
          script: |
            # Capture stdout+stderr to a log file the smoke-proverb
            # workflow can read — the only way to see deploy failures
            # without GitHub Actions log access.
            exec > >(tee /tmp/last-deploy.log) 2>&1
            echo "===== DEPLOY START $(date -u +%Y-%m-%dT%H:%M:%SZ) ====="
            set -eu

            WORK=/opt/indaba-app
            TMPCLONE=/tmp/indaba-stage

            # Set the token in an isolated subshell with no trace, so
            # it never lands in /tmp/last-deploy.log (which is posted
            # to issue #1 publicly-style).
            { TOKEN='${{ secrets.GITHUB_TOKEN }}'; } 2>/dev/null
            echo "[diag] token present: $([ -n "$TOKEN" ] && echo yes || echo no), length: ${#TOKEN}"

            set -x

            # Clone as ubuntu (no sudo) into /tmp. Repo is private so
            # we authenticate via x-access-token:$TOKEN@github.com — the
            # canonical GitHub HTTPS auth pattern that actions/checkout
            # uses internally. GIT_TERMINAL_PROMPT=0 makes git fail
            # cleanly instead of hanging if auth ever falls through.
            rm -rf "$TMPCLONE"
            { set +x; } 2>/dev/null
            GIT_TERMINAL_PROMPT=0 git clone --depth=1 --branch main \
              "https://x-access-token:${TOKEN}@github.com/fidelnamisi/indaba.git" \
              "$TMPCLONE"
            # Strip the credentialed URL immediately — token must not
            # persist in any .git/config we move into /opt.
            git -C "$TMPCLONE" remote set-url origin https://github.com/fidelnamisi/indaba.git
            unset TOKEN
            set -x

            # Stop the running service before mutating /opt/indaba-app.
            sudo systemctl stop indaba-app || true
            sudo pkill -9 -f "python.*app.py" || true
            sudo lsof -ti :5050 | xargs -r sudo kill -9 || true
            sudo lsof -ti :5051 | xargs -r sudo kill -9 || true
            sleep 2

            # rsync the new code into /opt/indaba-app, leaving venv/ and
            # data/ untouched. This is critical: pip-installed scripts
            # in venv/bin have absolute-path shebangs, so the venv MUST
            # stay at /opt/indaba-app/venv permanently. Moving it to a
            # staging path (the previous deploy strategy) corrupted the
            # shebangs and produced systemd 203/EXEC failures on restart.
            #
            # --delete removes files removed in the new clone, but the
            # --exclude rules keep venv/, data/, and pcloud token files
            # intact regardless.
            sudo mkdir -p "$WORK"
            sudo rsync -a --delete \
              --exclude='/venv' \
              --exclude='/data' \
              "$TMPCLONE/" "$WORK/"
            sudo chown -R ubuntu:ubuntu "$WORK"

            # Create venv from scratch every deploy. Slightly slower
            # (~30s) but bulletproof: any stale shebangs from a prior
            # broken deploy are wiped clean. A pip-installed script in
            # a venv has its shebang baked in as an absolute path, so
            # any prior path drift would persist forever otherwise.
            sudo rm -rf "$WORK/venv"
            python3 -m venv "$WORK/venv"
            "$WORK/venv/bin/python" -m pip install --upgrade pip
            "$WORK/venv/bin/pip" install -r "$WORK/requirements.txt"

            # Cleanup tmp clone.
            rm -rf "$TMPCLONE"

            sudo systemctl restart indaba-app
            sleep 6

            # Loud diagnostics if the service didn't come up.
            if ! sudo systemctl is-active --quiet indaba-app; then
              echo "::error::indaba-app service did not become active"
              echo "--- systemctl status ---"
              sudo systemctl status indaba-app --no-pager || true
              echo "--- ExecStart from unit file ---"
              sudo systemctl cat indaba-app | grep -E "ExecStart|WorkingDirectory|User" || true
              echo "--- last 80 journal lines ---"
              sudo journalctl -u indaba-app -n 80 --no-pager || true
              exit 1
            fi

            if ! curl -sf --max-time 15 http://localhost:5050/api/content-pipeline > /dev/null; then
              echo "::error::Health check FAILED — app not responding on :5050"
              echo "--- listening ports ---"
              sudo lsof -i :5050 || true
              echo "--- last 80 journal lines ---"
              sudo journalctl -u indaba-app -n 80 --no-pager || true
              exit 1
            fi
            echo "Health check passed — app is serving"
            echo "===== DEPLOY OK $(date -u +%Y-%m-%dT%H:%M:%SZ) ====="
