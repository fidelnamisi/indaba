name: Deploy to EC2
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 13.218.60.13
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /opt/indaba-app
            if [ ! -d ".git" ]; then
              git init
              git remote add origin https://github.com/fidelnamisi/indaba.git
              git fetch origin main
              git reset --hard origin/main
            else
              git pull origin main
            fi
            source venv/bin/activate
            pip install -r requirements.txt -q
            sudo pkill -9 -f "python.*app.py" || true
            sudo lsof -i :5050 -S -t | xargs -r kill -9 || true
            sudo lsof -i :5051 -S -t | xargs -r kill -9 || true
            sleep 2
            sudo systemctl restart indaba-app
            sleep 6
            sudo systemctl is-active indaba-app
            curl -sf http://localhost:5050/api/content-pipeline > /dev/null \
              && echo "✓ Health check passed — app is serving" \
              || (echo "✗ Health check FAILED — app not responding on :5050" && exit 1)
