name: Deploy to EC2
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 13.218.60.13
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          command_timeout: 10m
          script: |
            # Direct file redirect (no tee pipe — bash block-buffers
            # pipe-redirected stdout and silently truncates the log).
            exec > /tmp/last-deploy.log 2>&1
            echo "===== DEPLOY START $(date -u +%Y-%m-%dT%H:%M:%SZ) ====="
            set -eu

            WORK=/opt/indaba-app
            TMPCLONE=/tmp/indaba-stage

            # Strategy: build a working /opt/indaba-app/venv/bin/python
            # FIRST, before touching systemd. The unit has Restart=always
            # and has been failing 203/EXEC every ~10s for hours. Once
            # venv exists with valid python, the next auto-restart
            # succeeds on its own — no need to mask, pause, or stop the
            # service. Previous deploys that tried to fight the restart
            # loop hung on systemd interactions.

            echo "[step 1] git clone fresh code (repo is public — no auth needed)"
            rm -rf "$TMPCLONE"
            GIT_TERMINAL_PROMPT=0 git clone --depth=1 --branch main \
              https://github.com/fidelnamisi/indaba.git "$TMPCLONE"
            echo "[step 1 done] cloned $(git -C "$TMPCLONE" rev-parse --short HEAD)"

            echo "[step 2] rsync code into $WORK (preserving venv/, data/)"
            sudo mkdir -p "$WORK"
            sudo rsync -a --delete \
              --exclude='/venv' \
              --exclude='/data' \
              "$TMPCLONE/" "$WORK/"
            sudo chown -R ubuntu:ubuntu "$WORK"
            rm -rf "$TMPCLONE"
            echo "[step 2 done]"

            echo "[step 3] rebuild venv from scratch"
            sudo rm -rf "$WORK/venv"
            python3 -m venv "$WORK/venv"
            "$WORK/venv/bin/python" -m pip install --upgrade pip
            "$WORK/venv/bin/pip" install -r "$WORK/requirements.txt"
            echo "[step 3 done]"

            echo "[step 4] verify venv python exists"
            ls -la "$WORK/venv/bin/python"

            echo "[step 5] reset failure counter and restart cleanly"
            sudo systemctl reset-failed indaba-app || true
            sudo systemctl restart indaba-app
            echo "[step 5 done] sleeping 6s for service to come up"
            sleep 6

            echo "[step 6] post-start health check"
            if ! sudo systemctl is-active --quiet indaba-app; then
              echo "::error::indaba-app service did not become active"
              sudo systemctl status indaba-app --no-pager || true
              sudo journalctl -u indaba-app -n 80 --no-pager || true
              exit 1
            fi

            if ! curl -sf --max-time 15 http://localhost:5050/api/content-pipeline > /dev/null; then
              echo "::error::Health check FAILED"
              sudo lsof -i :5050 || true
              sudo journalctl -u indaba-app -n 80 --no-pager || true
              exit 1
            fi
            echo "Health check passed — app is serving"
            echo "===== DEPLOY OK $(date -u +%Y-%m-%dT%H:%M:%SZ) ====="
