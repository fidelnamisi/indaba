name: Post-deploy diagnostics
on:
  workflow_run:
    workflows: ["Deploy to EC2"]
    types: [completed]
  workflow_dispatch:

# Captures the deploy script's log + service state from EC2 and posts
# it to issue #1 after every Deploy to EC2 run. This is the only
# debugging window into deploys when GitHub Actions log access is not
# available from the build environment.

jobs:
  smoke:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    steps:
      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2.pem
          chmod 600 ~/.ssh/ec2.pem
          ssh-keyscan -H 13.218.60.13 >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Capture deploy diagnostics
        run: |
          set +e
          SSH="ssh -i ~/.ssh/ec2.pem -o StrictHostKeyChecking=no -o ConnectTimeout=15 ubuntu@13.218.60.13"
          DEPLOY_CONCLUSION="${{ github.event.workflow_run.conclusion }}"
          DEPLOY_CONCLUSION="${DEPLOY_CONCLUSION:-manual}"
          {
            echo "## Deploy diagnostics"
            echo "- Deploy conclusion: \`$DEPLOY_CONCLUSION\`"
            echo "- Commit: ${{ github.sha }}"
            echo "- Time (UTC): $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo
            echo "### Deploy script log (/tmp/last-deploy.log on EC2)"
            echo '```'
            $SSH "tail -200 /tmp/last-deploy.log 2>&1 || echo '(log file not present)'"
            echo '```'
            echo
            echo "### Service state"
            echo '```'
            $SSH "sudo systemctl is-active indaba-app; sudo systemctl is-failed indaba-app; cd /opt/indaba-app && git log -1 --oneline"
            echo '```'
            echo
            echo "### Last 40 journal lines for indaba-app"
            echo '```'
            $SSH "sudo journalctl -u indaba-app -n 40 --no-pager 2>&1 | tail -50"
            echo '```'
          } > diag-output.md 2>&1
          cat diag-output.md

      - name: Post diagnostics to tracking issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue comment 1 --repo fidelnamisi/indaba --body-file diag-output.md
